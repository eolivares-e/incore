services:
  postgres:
    image: postgres:16-alpine
    container_name: incore-postgres
    environment:
      - POSTGRES_USER=insurance_user
      - POSTGRES_PASSWORD=insurance_pass
      - POSTGRES_DB=insurance_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurance_user -d insurance_core"]
      interval: 10s
      timeout: 3s
      retries: 5

  customer_portal:
    build:
      context: ./frontend
      dockerfile: Dockerfile.customer
    container_name: incore-customer-portal
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/apps/customer_portal/.next
    depends_on:
      - backend

  sales_funnel:
    build:
      context: ./frontend
      dockerfile: Dockerfile.sales
    container_name: incore-sales-funnel
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/apps/sales_funnel/.next
    depends_on:
      - backend

  admin_portal:
    build:
      context: ./frontend
      dockerfile: Dockerfile.admin
    container_name: incore-admin-portal
    ports:
      - "3002:3002"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/apps/admin_portal/.next
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=Insurance Core API
      - VERSION=0.1.0
      - DATABASE_URL=postgresql+asyncpg://insurance_user:insurance_pass@postgres:5432/insurance_core
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
